name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: renderer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run renderer golden-fixture tests
        run: node --test agent-toolkit/scripts/render-review.test.mjs
